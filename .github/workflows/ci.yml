name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  go:
    name: Go lint, test, build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: conduit
          POSTGRES_PASSWORD: conduit
          POSTGRES_DB: conduit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U conduit -d conduit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Verify modules
        run: go mod verify
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test (in-memory)
        run: go test ./... -timeout 120s
      - name: Test (Postgres backend)
        env:
          PG_TEST: "1"
          DATABASE_URL: "postgres://conduit:conduit@localhost:5432/conduit?sslmode=disable"
        run: go test ./engine -run Postgres -timeout 120s
